<!DOCTYPE html>
<html lang="no">
<head>
  <!-- [BEHOLD ALLE HEAD-ELEMENTER SOM DE ER] -->
  
  <!-- Legg til denne i <head> for å unngå caching -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
</head>
<body>
  <!-- [BEHOLD ALL HTML STRUKTUR SOM DEN ER] -->

  <script>
    // ==================== KONFIGURASJON ====================
    // Erstatt eksisterende KVDB-konfigurasjon med dette:
    const DATA_URL = '/data.json';
    
    // Cache for å unngå for mange kall
    let cachedData = null;
    let lastFetchTime = 0;
    const CACHE_DURATION = 2000; // 2 sekunder cache

    // ==================== DATA-HENTING ====================
    async function fetchData(forceRefresh = false) {
      const now = Date.now();
      if (!forceRefresh && cachedData && (now - lastFetchTime) < CACHE_DURATION) {
        return cachedData;
      }

      try {
        const response = await fetch(DATA_URL + '?t=' + now);
        if (!response.ok) throw new Error('Kunne ikke hente data');
        const data = await response.json();
        cachedData = data;
        lastFetchTime = now;
        return data;
      } catch (error) {
        console.error('Feil ved henting av data:', error);
        // Returner cached data hvis tilgjengelig
        return cachedData || getDefaultData();
      }
    }

    function getDefaultData() {
      return {
        handleliste: [
          { id: 1, tekst: "Melk", checked: false },
          { id: 2, tekst: "Brød", checked: false },
          { id: 3, tekst: "Egg", checked: false }
        ],
        notater: { quickNote: "" },
        soppeltomming: [
          { id: "restavfall", navn: "Restavfall", emoji: "🟢", dato: "2026-06-28" },
          { id: "papir", navn: "Papir", emoji: "🔵", dato: "2026-07-02" },
          { id: "matavfall", navn: "Matavfall", emoji: "🟤", dato: "2026-06-27" },
          { id: "glassmetall", navn: "Glass/metall", emoji: "🟣", dato: "2026-07-10" }
        ],
        datonotater: {},
        egneHendelser: [],
        innstillinger: {
          icalUrl: "https://www.officeholidays.com/ics/ics_country.php?tbl_country=Norway"
        }
      };
    }

    // ==================== OPPDATERTE FUNKSJONER ====================
    
    // Erstatt syncHandlelisteFraKvdb() med:
    async function lastHandlelisteFraJson() {
      try {
        const data = await fetchData();
        return data.handleliste || [];
      } catch (e) {
        console.warn('Kunne ikke laste handleliste:', e);
        return [];
      }
    }

    // Erstatt syncHandlelisteTilKvdb() med:
    async function lagreHandlelisteTilJson(handleliste) {
      try {
        const data = await fetchData(true);
        data.handleliste = handleliste;
        
        // Send til API for lagring
        const response = await fetch('/api/update', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            type: 'handleliste',
            data: handleliste
          })
        });
        
        if (!response.ok) throw new Error('Kunne ikke lagre data');
        cachedData = data;
        lastFetchTime = Date.now();
      } catch (error) {
        console.error('Feil ved lagring:', error);
      }
    }

    // Oppdatert visHandleliste()
    async function visHandleliste() {
      try {
        const varer = await lastHandlelisteFraJson();
        const aktive = varer.filter(v => !v.checked);
        const fullforte = varer.filter(v => v.checked);
        document.getElementById('listCount').textContent = aktive.length;

        const lagVare = (v) => `
          <li style="display: flex; align-items: center; gap: 0.35rem; padding: 0.2rem 0.35rem; border-radius: 0.4rem; background: rgba(255,255,255,0.02); transition: all 0.15s; font-size: 0.6rem;">
            <span class="chk ${v.checked ? 'checked' : ''}" onclick="veksleVare('${v.id}', ${!v.checked})"></span>
            <span style="flex: 1; ${v.checked ? 'color: #a1a1aa; text-decoration: line-through; opacity: 0.5;' : 'color: #e4e4e7;'}">${v.tekst}</span>
            <button onclick="slettVare('${v.id}')" style="color: #71717a; background: none; border: none; font-size: 0.55rem; cursor: pointer;">
              <i class="fa-solid fa-xmark"></i>
            </button>
          </li>`;

        document.getElementById('handleListe').innerHTML = aktive.map(lagVare).join('') + fullforte.map(lagVare).join('');
      } catch (e) { 
        console.warn('Vis handleliste feilet:', e); 
      }
    }

    // Oppdatert leggTilVare()
    async function leggTilVare() {
      try {
        const tekst = document.getElementById('tingInput').value.trim();
        if (!tekst) return;
        
        const varer = await lastHandlelisteFraJson();
        const nyVare = {
          id: Date.now().toString(),
          tekst: tekst,
          checked: false,
          opprettet: new Date().toISOString()
        };
        varer.push(nyVare);
        
        await lagreHandlelisteTilJson(varer);
        document.getElementById('tingInput').value = '';
        await visHandleliste();
        renderViktigIDag().catch(e => console.warn('Viktig-i-dag feilet:', e));
      } catch (e) { console.warn('Legg til vare feilet:', e); }
    }

    // Oppdatert veksleVare()
    async function veksleVare(id, checked) {
      try {
        const varer = await lastHandlelisteFraJson();
        const vare = varer.find(v => v.id === id);
        if (vare) {
          vare.checked = checked;
          vare.completedAt = checked ? new Date().toISOString() : null;
        }
        
        await lagreHandlelisteTilJson(varer);
        await visHandleliste();
        renderViktigIDag().catch(e => console.warn('Viktig-i-dag feilet:', e));
      } catch (e) { console.warn('Veksle vare feilet:', e); }
    }

    // Oppdatert slettVare()
    async function slettVare(id) {
      try {
        let varer = await lastHandlelisteFraJson();
        varer = varer.filter(v => v.id !== id);
        
        await lagreHandlelisteTilJson(varer);
        await visHandleliste();
        renderViktigIDag().catch(e => console.warn('Viktig-i-dag feilet:', e));
      } catch (e) { console.warn('Slett vare feilet:', e); }
    }

    // Oppdatert lastNotat()
    async function lastNotat() {
      try {
        const data = await fetchData();
        if (data.notater && data.notater.quickNote) {
          document.getElementById('quickNote').value = data.notater.quickNote;
          document.getElementById('charCount').textContent = `${data.notater.quickNote.length} tegn`;
        }
      } catch (e) { console.warn('Last notat feilet:', e); }
    }

    // Oppdatert lagreNotat()
    async function lagreNotat() {
      try {
        const data = await fetchData(true);
        const noteText = document.getElementById('quickNote').value;
        data.notater = data.notater || {};
        data.notater.quickNote = noteText;
        
        await fetch('/api/update', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            type: 'notater',
            data: data.notater
          })
        });
        
        document.getElementById('saveStatus').textContent = 'Lagret ✓';
        setTimeout(() => document.getElementById('saveStatus').textContent = 'Lagres automatisk', 2000);
      } catch (e) { 
        console.warn('Lagre notat feilet:', e);
        document.getElementById('saveStatus').textContent = 'Feil ved lagring';
      }
    }

    // Oppdatert initSoppel()
    async function initSoppel() {
      try {
        const data = await fetchData();
        if (!data.soppeltomming || data.soppeltomming.length === 0) {
          data.soppeltomming = getDefaultData().soppeltomming;
          await fetch('/api/update', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              type: 'soppeltomming',
              data: data.soppeltomming
            })
          });
        }
        renderSoppelListe().catch(e => console.warn('Søppel-rendring feilet:', e));
      } catch (e) { console.warn('Init søppel feilet:', e); }
    }

    // Oppdatert renderSoppelListe()
    async function renderSoppelListe() {
      try {
        const cont = document.getElementById('soppelListe');
        const data = await fetchData();
        const soppelData = data.soppeltomming || [];
        
        const naa = new Date(); naa.setHours(0,0,0,0);
        let html = '';
        
        for (const type of soppelData) {
          if (!type.dato) continue;
          const dato = new Date(type.dato);
          const dager = Math.round((dato - naa) / 86400000);
          const innen24t = dager <= 1;
          let tekst;
          if (dager < 0) tekst = `${Math.abs(dager)}dg siden`;
          else if (dager === 0) tekst = 'I dag';
          else if (dager === 1) tekst = 'I morgen';
          else tekst = `${dager}d`;

          html += `<div style="display: flex; justify-content: space-between; align-items: center; padding: 0.2rem 0.35rem; border-radius: 0.4rem; background: rgba(255,255,255,0.02); ${innen24t ? 'animation: glow-pulse 2s infinite; border: 1px solid rgba(251,113,133,0.3);' : ''}">
            <span style="font-size: 0.6rem;">${type.emoji || '📅'} ${type.navn}</span>
            <span style="font-size: 0.55rem; font-weight: 600; ${innen24t ? 'color: #fb7185;' : 'color: #d4d4d8;'}">${tekst}</span>
          </div>`;
        }
        cont.innerHTML = html;
      } catch (e) { console.warn('Render søppel feilet:', e); }
    }

    // Oppdatert lastEgneHendelser()
    async function lastEgneHendelser() {
      try { 
        const data = await fetchData();
        egneHendelser = data.egneHendelser || []; 
      } catch (e) { 
        console.warn('Last egne hendelser feilet:', e); 
        egneHendelser = []; 
      }
    }

    // Fjern alle IndexedDB-funksjoner og erstatt init() med:
    async function init() {
      try {
        // Initialiser data.json hvis den ikke finnes
        try {
          const response = await fetch(DATA_URL);
          if (!response.ok) {
            await initializeDataJson();
          }
        } catch {
          await initializeDataJson();
        }

        // Last inn data
        const initialData = await fetchData(true);
        
        // Last inn iCal-url
        if (initialData.innstillinger && initialData.innstillinger.icalUrl) {
          icalUrl = initialData.innstillinger.icalUrl;
        }

        // Start alle async-operasjoner
        visHandleliste().catch(e => console.warn('Handleliste-visning feilet:', e));
        initSoppel().catch(e => console.warn('Søppel-init feilet:', e));
        lastNotat().catch(e => console.warn('Notat-lasting feilet:', e));
        lastEgneHendelser().catch(e => console.warn('Hendelse-lasting feilet:', e));
        hentICalManuelt().catch(e => console.warn('iCal-henting feilet:', e));
        hentVeerdata().catch(e => console.warn('Vær-henting feilet:', e));

        // Periodiske oppdateringer
        setInterval(() => {
          fetchData(true).then(() => visHandleliste()).catch(e => console.warn('Periodisk oppdatering feilet:', e));
        }, 30000);
        
        setInterval(() => hentVeerdata().catch(e => console.warn('Periodisk vær feilet:', e)), 900000);
        setInterval(() => hentICalManuelt().catch(e => console.warn('Periodisk iCal feilet:', e)), 1800000);
        setInterval(() => renderViktigIDag().catch(e => console.warn('Periodisk viktig-i-dag feilet:', e)), 60000);
        setInterval(() => renderSoppelListe().catch(e => console.warn('Periodisk søppel feilet:', e)), 60000);

        window.sisteDato = new Date().toISOString().split('T')[0];
        console.log('✅ Dashboard initialisert med data.json');
      } catch (e) {
        console.error('❌ Initialisering feilet:', e);
      }
    }

    async function initializeDataJson() {
      const defaultData = getDefaultData();
      try {
        await fetch('/api/update', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            type: 'initialize',
            data: defaultData
          })
        });
      } catch (error) {
        console.error('Kunne ikke initialisere data.json:', error);
      }
    }

    init();
  </script>
</body>
</html>
